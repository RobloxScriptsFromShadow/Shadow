<!DOCTYPE html>
<html>
<head>

<title>MM2 Shadow Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<script>
if(!sessionStorage.getItem("shadow_token")){
window.location.href="index.html"
}
</script>

<style>

body{
background:#050505;
color:#00ff9c;
font-family:'Share Tech Mono', monospace;
margin:0;
padding:60px;
overflow-x:hidden;
}

.matrix{
position:fixed;
top:0;
left:0;
z-index:-1;
}

h1{
font-family:'Orbitron';
font-size:42px;
margin-bottom:10px;
}

.status{
margin-bottom:20px;
font-size:16px;
}

.features{
margin-bottom:30px;
line-height:1.6;
}

.scriptbox{
background:#0a0a0a;
border:1px solid #00ff9c;
padding:25px;
border-radius:10px;
max-width:800px;
}

textarea{
width:100%;
height:120px;
background:#050505;
color:#00ff9c;
border:none;
font-family:monospace;
resize:none;
}

button{
margin-top:20px;
padding:12px 24px;
background:black;
color:#00ff9c;
border:1px solid #00ff9c;
cursor:pointer;
font-family:'Share Tech Mono';
}

button:hover{
background:#00ff9c;
color:black;
}

.verifyText{
margin-top:15px;
opacity:0.8;
}

.hidden{
display:none;
}

#copyNotify{
position:fixed;
bottom:30px;
right:30px;
background:#0a0a0a;
border:1px solid #00ff9c;
color:#00ff9c;
padding:14px 20px;
border-radius:8px;
font-family:'Share Tech Mono';
box-shadow:0 0 10px #00ff9c33;
opacity:0;
transform:translateY(20px);
transition:0.4s;
z-index:9999;
}

#copyNotify.show{
opacity:1;
transform:translateY(0);
}

</style>

</head>

<body>

<canvas class="matrix"></canvas>

<h1>MM2 Shadow Hub</h1>

<div class="status">
Status: 🟢 Undetected
</div>

<div class="features">
Features:
<br>• ESP
<br>• Role Detection
<br>• Gun Notifier
<br>• Auto Shoot
</div>

<div class="scriptbox">

<button id="verifyBtn" onclick="verifyServer()">Verify Server</button>

<div id="verifyText" class="verifyText hidden">
Connecting to Shadow Network...
</div>

<div id="scriptArea" class="hidden">

<textarea id="script"></textarea>

<button onclick="copyScript()">Copy Script</button>

</div>

</div>

<div id="copyNotify">Script Copied ✔</div>

<script>

const encodedScript="bG9hZHN0cmluZyhnYW1lOkh0dHBHZXQoImh0dHBzOi8vcGFzdGViaW4uY29tL3Jhdy9oYTVEYTVXRSIpKSgp"

function verifyServer(){

let btn=document.getElementById("verifyBtn")
let text=document.getElementById("verifyText")

btn.style.display="none"
text.classList.remove("hidden")

setTimeout(()=>{
text.innerText="Authorizing user..."
},1200)

setTimeout(()=>{
text.innerText="Decrypting script..."
},2500)

setTimeout(()=>{
text.innerText="Access Granted"
},3500)

setTimeout(()=>{

text.style.display="none"

let script=atob(encodedScript)

document.getElementById("script").value=script

document.getElementById("scriptArea").classList.remove("hidden")

},4200)

}

function copyScript(){

let copyText=document.getElementById("script")

copyText.select()
copyText.setSelectionRange(0,99999)

navigator.clipboard.writeText(copyText.value)

let notify=document.getElementById("copyNotify")

notify.classList.add("show")

setTimeout(()=>{
notify.classList.remove("show")
},2000)

}

const canvas=document.querySelector(".matrix")
const ctx=canvas.getContext("2d")

canvas.height=window.innerHeight
canvas.width=window.innerWidth

const letters="01"
const fontSize=14
const columns=canvas.width/fontSize

const drops=[]

for(let x=0;x<columns;x++)
drops[x]=1

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#00ff9c"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){

const text=letters.charAt(Math.floor(Math.random()*letters.length))

ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height&&Math.random()>0.975)
drops[i]=0

drops[i]++

}

}

setInterval(draw,33)

</script>

</body>
</html>
